# Lispium (.lspm) - symbolic CAS lisp
[language-server.lispium]
command = "lispium"
args = ["lsp"]

[[language]]
name = "lispium"
scope = "source.lispium"
file-types = ["lspm"]
comment-tokens = [";"]
indent = { tab-width = 2, unit = "  " }
language-servers = ["lispium"]
# Reuse the bundled tree-sitter scheme grammar for s-expression highlighting
grammar = "scheme"
auto-format = false
